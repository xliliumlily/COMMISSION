    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLabel"></h5> <!--大圖的標題，-->
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button> <!--右上角的關閉按鈕-->
                </div>

                <div class="modal-body text-center">
                    <img id="modalImage" class="img-fluid"> <!--大圖的img，會根據點擊的小圖改變src-->
                </div>

            </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script> <!--bootstrap的js-->
    <script>
        //先讀取有card-img-top的圖片，讓這些圖片能點擊後有大圖
        document.querySelectorAll('.card-img-top').forEach(img => {
            img.addEventListener('click', function () {
                document.getElementById('modalImage').src = this.dataset.img;
               document.getElementById('exampleModalLabel').textContent = this.dataset.title ;
            });
        });

            //切換頁面功能
        function showPage(pageNumber) {
            document.getElementById('page1').style.display = 'none';
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page3').style.display = 'none';
            document.getElementById('page4').style.display = 'none';

            document.getElementById('page' + pageNumber).style.display = 'block';

            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-link')[pageNumber - 1].classList.add('active');
        }

        //手機版選單功能
        document.querySelector('.phone-menu-btn').addEventListener('click', function() {
            const menu = document.querySelector('.phone-menu');
            if (menu.style.display === 'none' || menu.style.display === '') {
                menu.style.display = 'flex';
                menu.classList.add('active');
            }
            else {
                menu.style.display = 'none';
            }
        });
        

    </script>
